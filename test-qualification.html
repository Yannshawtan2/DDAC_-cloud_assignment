<!DOCTYPE html>
<html>
<head>
    <title>Test Qualification Submission</title>
</head>
<body>
    <h1>Test Qualification Submission</h1>
    <form action="http://localhost:8080/qualification/submit" method="post" enctype="multipart/form-data">
        <p>
            <label>Name: <input type="text" name="applicantName" value="Test Doctor" required></label>
        </p>
        <p>
            <label>Email: <input type="email" name="applicantEmail" value="test@example.com" required></label>
        </p>
        <p>
            <label>Role: 
                <select name="requestedRole" required>
                    <option value="DOCTOR">DOCTOR</option>
                    <option value="DIETICIAN">DIETICIAN</option>
                </select>
            </label>
        </p>
        <p>
            <label>License Number: <input type="text" name="licenseNumber" value="MD123456" required></label>
        </p>
        <p>
            <label>License Type: <input type="text" name="licenseType" value="Medical License" required></label>
        </p>
        <p>
            <label>License File: <input type="file" name="licenseFile" required></label>
        </p>
        <p>
            <button type="submit">Submit Application</button>
        </p>
    </form>
</body>
</html>
