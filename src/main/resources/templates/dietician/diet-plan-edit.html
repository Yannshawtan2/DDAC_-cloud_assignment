<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Diabetes Diet Plan - Dietician Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link th:href="@{/css/dietician-styles.css}" rel="stylesheet">
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <!-- Sidebar -->
            <div th:replace="dietician/sidebar :: dietician-sidebar('diet-plans')"></div>

            <!-- Main content -->
            <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4">
                <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
                    <h1 class="h2">
                        <i class="fas fa-edit me-2"></i>Edit Diabetes Diet Plan
                    </h1>
                    <div class="btn-toolbar mb-2 mb-md-0">
                        <a th:href="@{/dietician/diet-plans/{id}(id=${dietPlan.id})}" class="btn btn-secondary me-2">
                            <i class="fas fa-times me-2"></i>Cancel
                        </a>
                    </div>
                </div>

                <!-- Current Status Alert -->
                <div class="alert alert-warning d-flex align-items-center mb-4" role="alert">
                    <i class="fas fa-info-circle me-2"></i>
                    <div>
                        <strong>Editing Diabetes Diet Plan:</strong> <span th:text="${dietPlan.title}">Diet Plan Title</span> for 
                        <span th:text="${dietPlan.patient.name}">Patient Name</span>
                    </div>
                </div>

                <!-- Form -->
                <div class="card">
                    <div class="card-header">
                        <h5 class="mb-0"><i class="fas fa-utensils me-2"></i>Diet Plan Details</h5>
                    </div>
                    <div class="card-body">
                        <form th:action="@{/dietician/diet-plans/{id}(id=${dietPlan.id})}" th:object="${dietPlan}" method="post">
                            <div class="row">
                                <div class="col-md-8">
                                    <label for="title" class="form-label">Diet Plan Title *</label>
                                    <input type="text" class="form-control" id="title" th:field="*{title}" 
                                           placeholder="Enter diet plan title" required>
                                </div>
                                <div class="col-md-4">
                                    <label for="patientId" class="form-label">Patient *</label>
                                    <select class="form-select" id="patientId" name="patientId" required>
                                        <option value="">Select Patient</option>
                                        <option th:each="patient : ${patients}" 
                                                th:value="${patient.id}" 
                                                th:selected="${patient.id == dietPlan.patient.id}"
                                                th:text="${patient.name}">Patient Name</option>
                                    </select>
                                </div>
                            </div>
                            <div class="row">
                                <div class="col-md-6">
                                    <label for="startDate" class="form-label">Start Date *</label>
                                    <input type="date" class="form-control" id="startDate" 
                                           th:value="${dietPlan.startDate}" 
                                           name="startDate" required>
                                </div>
                                <div class="col-md-6">
                                    <label for="endDate" class="form-label">End Date *</label>
                                    <input type="date" class="form-control" id="endDate" 
                                           th:value="${dietPlan.endDate}" 
                                           name="endDate" required>
                                </div>
                            </div>

                            <div class="row">
                                <div class="col-md-12">
                                    <label for="description" class="form-label">Description</label>
                                    <textarea class="form-control" id="description" th:field="*{description}" 
                                              rows="3" placeholder="Enter diet plan description"></textarea>
                                </div>
                            </div>

                            <div class="row">
                                <div class="col-md-6">
                                    <label for="dailyCalories" class="form-label">Daily Calories Target</label>
                                    <input type="number" class="form-control" id="dailyCalories" th:field="*{dailyCalories}" 
                                           placeholder="e.g., 2000" min="0">
                                </div>
                                <div class="col-md-6">
                                    <label for="status" class="form-label">Status</label>
                                    <select class="form-select" id="status" th:field="*{status}">
                                        <option value="ACTIVE">Active</option>
                                        <option value="COMPLETED">Completed</option>
                                        <option value="SUSPENDED">Suspended</option>
                                    </select>
                                </div>
                            </div>

                            <h5 class="mt-4 mb-3">Meal Plans</h5>
                            
                            <div class="row">
                                <div class="col-md-6">
                                    <label for="breakfast" class="form-label">Breakfast</label>
                                    <textarea class="form-control" id="breakfast" th:field="*{breakfast}" 
                                              rows="4" placeholder="Enter breakfast recommendations"></textarea>
                                </div>
                                <div class="col-md-6">
                                    <label for="lunch" class="form-label">Lunch</label>
                                    <textarea class="form-control" id="lunch" th:field="*{lunch}" 
                                              rows="4" placeholder="Enter lunch recommendations"></textarea>
                                </div>
                            </div>

                            <div class="row">
                                <div class="col-md-6">
                                    <label for="dinner" class="form-label">Dinner</label>
                                    <textarea class="form-control" id="dinner" th:field="*{dinner}" 
                                              rows="4" placeholder="Enter dinner recommendations"></textarea>
                                </div>
                                <div class="col-md-6">
                                    <label for="snacks" class="form-label">Snacks</label>
                                    <textarea class="form-control" id="snacks" th:field="*{snacks}" 
                                              rows="4" placeholder="Enter snack recommendations"></textarea>
                                </div>
                            </div>

                            <h5 class="mt-4 mb-3">Additional Information</h5>
                            
                            <div class="row">
                                <div class="col-md-6">
                                    <label for="dietaryRestrictions" class="form-label">Dietary Restrictions</label>
                                    <textarea class="form-control" id="dietaryRestrictions" th:field="*{dietaryRestrictions}" 
                                              rows="3" placeholder="Enter any dietary restrictions or allergies"></textarea>
                                </div>
                                <div class="col-md-6">
                                    <label for="specialInstructions" class="form-label">Special Instructions</label>
                                    <textarea class="form-control" id="specialInstructions" th:field="*{specialInstructions}" 
                                              rows="3" placeholder="Enter any special instructions or notes"></textarea>
                                </div>
                            </div>

                            <div class="row mt-4">
                                <div class="col-12">
                                    <button type="submit" class="btn btn-primary me-3">
                                        <i class="fas fa-save me-2"></i>Update Diabetes Plan
                                    </button>
                                    <a th:href="@{/dietician/diet-plans/{id}(id=${dietPlan.id})}" class="btn btn-secondary me-3">
                                        <i class="fas fa-times me-2"></i>Cancel
                                    </a>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>

                <!-- Delete Section -->
                <div class="card mt-4">
                    <div class="card-header bg-danger text-white">
                        <h5 class="mb-0"><i class="fas fa-trash me-2"></i>Danger Zone</h5>
                    </div>
                    <div class="card-body">
                        <p class="text-muted">Once you delete a diabetes diet plan, there is no going back. Please be certain.</p>
                        <form th:action="@{/dietician/diet-plans/{id}/delete(id=${dietPlan.id})}" method="post" 
                              onsubmit="return confirm('Are you sure you want to delete this diabetes diet plan? This action cannot be undone.')">
                            <button type="submit" class="btn btn-danger">
                                <i class="fas fa-trash me-2"></i>Delete Diabetes Plan
                            </button>
                        </form>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
