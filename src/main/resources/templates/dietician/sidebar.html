<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
</head>
<body>
    <!-- Dietician Sidebar Fragment -->
    <nav th:fragment="dietician-sidebar(activePage)" class="col-md-3 col-lg-2 d-md-block sidebar collapse">
        <div class="position-sticky pt-3">
            <h5 class="text-center mb-4">
                <i class="fas fa-user-md me-2"></i>Dietitian Panel
            </h5>
            
            <ul class="nav flex-column">
                <li class="nav-item">
                    <a class="nav-link" th:classappend="${activePage == 'dashboard'} ? 'active' : ''" 
                       href="/dieticiandashboard">
                        <i class="fas fa-tachometer-alt me-2"></i>Dashboard
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:classappend="${activePage == 'diet-plans'} ? 'active' : ''" 
                       href="/dietician/diet-plans">
                        <i class="fas fa-heartbeat me-2"></i>Diabetes Diet Plans
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:classappend="${activePage == 'quiz-questions'} ? 'active' : ''" 
                       href="/dietician/quiz/questions">
                        <i class="fas fa-question-circle me-2"></i>Quiz Questions
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:classappend="${activePage == 'quiz-results'} ? 'active' : ''" 
                       href="/dietician/quiz/results">
                        <i class="fas fa-chart-bar me-2"></i>Quiz Results
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:classappend="${activePage == 'events'} ? 'active'" href="/dietician/events">
                        <i class="fas fa-calendar-day me-2"></i>
                        Events
                    </a>
                </li>
                <li class="nav-item mt-4">
                    <a class="nav-link" href="/logout">
                        <i class="fas fa-sign-out-alt me-2"></i>Logout
                    </a>
                </li>
            </ul>
        </div>
    </nav>
</body>
</html>
