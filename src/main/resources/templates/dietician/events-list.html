<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Events - Dietician</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link th:href="@{/css/dietician-styles.css}" rel="stylesheet">
    <style>
        /* Events Grid Specific Styles */
        .section-title { 
            text-align: center; 
            font-size: 1.5rem; 
            margin: 40px 0; 
            color: #000;
            font-weight: 600;
        }
        .events-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(250px, 250px)); 
            gap: 16px; 
            justify-content: center; 
        }
        .event-card { 
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: none;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            border-radius: 15px;
            overflow: hidden;
            cursor: pointer;
        }
        .event-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 40px rgba(0,0,0,0.15);
        }
        .event-card img { 
            width: 100%; 
            height: 160px; 
            object-fit: cover; 
        }
        .event-card .card-body { 
            padding: 12px; 
            flex: 1; 
        }
        .event-card .card-body h3 { 
            margin: 0 0 8px; 
            font-size: 1.1rem; 
            color: #000;
            font-weight: 600;
        }
        .event-card .card-body p { 
            margin: 0; 
            color: #555; 
            font-size: 0.9rem; 
        }

        /* Detail Modal */
        .modal { 
            display: none; 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background: rgba(0,0,0,0.4); 
            justify-content: center; 
            align-items: center; 
            z-index: 1000; 
        }
        .modal.show { 
            display: flex; 
        }
        .modal-content { 
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 15px; 
            max-width: 600px; 
            width: 90%; 
            max-height: 90vh; 
            overflow-y: auto; 
            position: relative;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .modal-header { 
            padding: 20px; 
            border-bottom: 1px solid rgba(0,0,0,0.1); 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            background: linear-gradient(90deg, var(--color-accent2) 0%, var(--color-accent1) 100%);
            border-radius: 15px 15px 0 0;
        }
        .modal-header h2 { 
            margin: 0; 
            font-size: 1.25rem; 
            color: #000;
            font-weight: 600;
        }
        .modal-body { 
            padding: 20px; 
        }
        .modal-body img { 
            width: 100%; 
            border-radius: 10px; 
            margin-bottom: 15px; 
        }
        .modal-body p { 
            margin: 0 0 12px; 
            color: #000;
            line-height: 1.6;
        }
        .close-btn { 
            background: none; 
            border: none; 
            font-size: 1.5rem; 
            cursor: pointer; 
            color: #000;
            font-weight: bold;
            transition: all 0.3s ease;
        }
        .close-btn:hover {
            transform: scale(1.2);
        }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <!-- Include shared sidebar -->
            <div th:replace="dietician/sidebar :: dietician-sidebar('events')"></div>
            
            <!-- Main content -->
            <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4">
                <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
                    <h1 class="h2">
                        <i class="fas fa-calendar-alt me-2"></i>Health Events
                    </h1>
                    <div class="btn-toolbar mb-2 mb-md-0">
                        <a href="/dieticiandashboard" class="btn btn-outline-primary">
                            <i class="fas fa-arrow-left me-2"></i>Back to Dashboard
                        </a>
                    </div>
                </div>
                
                <h2 class="section-title">Health Events & News</h2>
                
                <div class="events-grid">
                    <div class="event-card"
                         th:each="evt : ${events}"
                         th:onclick="|openDetail(this)|"
                         th:data-title="${evt.title}"
                         th:data-content="${evt.content}"
                         th:data-image="${evt.image}">

                        <img th:src="${evt.image}"
                             alt="Event image"
                             onerror="this.src='https://via.placeholder.com/300x160?text=No+Image'" />

                        <div class="card-body">
                            <h3 th:text="${evt.title}">Event Title</h3>                          
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- Detail Modal -->
    <div id="detailModal" class="modal" onclick="closeDetail(event)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="modal-header">
                <h2 id="modalTitle"></h2>
                <button class="close-btn" onclick="closeDetail(event)">×</button>
            </div>
            <div class="modal-body">
                <img id="modalImage" src="" alt="Event image" onerror="this.src='https://via.placeholder.com/600x300?text=No+Image'" />
                <p id="modalContent"></p>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function openDetail(card) {
            const title = card.getAttribute('data-title');
            const content = card.getAttribute('data-content');
            const image = card.getAttribute('data-image');
            document.getElementById('modalTitle').textContent = title;
            document.getElementById('modalContent').textContent = content;
            document.getElementById('modalImage').src = image;
            document.getElementById('detailModal').classList.add('show');
        }
        
        function closeDetail(e) {
            document.getElementById('detailModal').classList.remove('show');
        }
    </script>
</body>
</html>
