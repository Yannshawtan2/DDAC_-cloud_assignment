<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>
    <!-- Doctor Sidebar Fragment -->
    <div th:fragment="doctor-sidebar(activePage)" class="col-md-3 col-lg-2 d-md-block bg-light sidebar collapse">
        <div class="position-sticky pt-3">
            <!-- Doctor Info -->
            <div class="sidebar-header mb-4">
                <div class="d-flex align-items-center">
                    <div class="avatar-circle">
                        <i class="fas fa-user-md"></i>
                    </div>
                    <div class="ms-3">
                        <h6 class="mb-0">Dr. Portal</h6>
                        <small class="text-muted">Treatment Management</small>
                    </div>
                </div>
            </div>

            <!-- Navigation Menu -->
            <ul class="nav flex-column">
                <li class="nav-item">
                    <a class="nav-link" th:classappend="${activePage == 'dashboard'} ? 'active'" href="/doctor/dashboard">
                        <i class="fas fa-tachometer-alt me-2"></i>
                        Dashboard
                    </a>
                </li>
                
                <li class="nav-item">
                    <a class="nav-link" th:classappend="${activePage == 'treatment-plans'} ? 'active'" href="/doctor/treatment-plans">
                        <i class="fas fa-clipboard-list me-2"></i>
                        Treatment Plans
                    </a>
                </li>
            </ul>

            <!-- Logout -->
            <div class="mt-auto pt-4">
                <form action="/logout" method="post" class="d-inline">
                    <button type="submit" class="btn btn-outline-danger btn-sm w-100">
                        <i class="fas fa-sign-out-alt me-2"></i>Logout
                    </button>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
