<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Treatment Plan - Doctor Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link th:href="@{/css/dietician-styles.css}" rel="stylesheet">
</head>
<body>
    <div class="container-fluid ">
        <div class="row">
            <!-- Include shared sidebar -->
            <div th:replace="doctor/sidebar :: doctor-sidebar('treatment-plans')"></div>

            <!-- Main content -->
            <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 pb-4">
                <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
                    <h1 class="h2">Edit Treatment Plan</h1>
                    <div class="btn-toolbar mb-2 mb-md-0">
                        <a th:href="@{'/doctor/treatment-plans/' + ${treatmentPlan.id}}" class="btn btn-outline-info">View Plan</a>
                        <a href="/doctor/treatment-plans" class="btn btn-outline-secondary ms-2">Back to Plans</a>
                    </div>
                </div>

                <!-- Treatment Plan Form -->
                <div class="row">
                    <div class="col-12">
                        <div class="card">
                            <div class="card-header">
                                <h5 class="mb-0">Update Treatment Plan Details</h5>
                            </div>
                            <div class="card-body">
                                <form th:action="@{/doctor/treatment-plans/save}" th:object="${treatmentPlan}" method="post">
                                    <input type="hidden" th:field="*{id}">
                                    
                                    <div class="row">
                                        <div class="col-md-6">
                                            <div class="mb-3">
                                                <label for="title" class="form-label">Title *</label>
                                                <input type="text" class="form-control" th:field="*{title}" id="title" required>
                                            </div>
                                        </div>
                                        
                                        <div class="col-md-6">
                                            <div class="mb-3">
                                                <label for="patient" class="form-label">Patient *</label>
                                                <select class="form-select" th:field="*{patient.id}" id="patient" required>
                                                    <option value="">Select a patient</option>
                                                    <option th:each="pat : ${patients}" 
                                                            th:value="${pat.id}" 
                                                            th:text="${pat.name + ' (' + pat.email + ')'}"
                                                            th:selected="${treatmentPlan.patient != null and treatmentPlan.patient.id == pat.id}">
                                                        John Doe (john@example.com)
                                                    </option>
                                                </select>
                                            </div>
                                        </div>
                                    </div>

                                    <div class="row">
                                        <div class="col-12">
                                            <div class="mb-3">
                                                <label for="description" class="form-label">Description</label>
                                                <textarea class="form-control" th:field="*{description}" id="description" rows="3"></textarea>
                                            </div>
                                        </div>
                                    </div>

                                    <div class="row">
                                        <div class="col-md-4">
                                            <div class="mb-3">
                                                <label for="status" class="form-label">Status</label>
                                                <select class="form-select" th:field="*{status}" id="status">
                                                    <option value="ACTIVE">Active</option>
                                                    <option value="PAUSED">Paused</option>
                                                    <option value="COMPLETED">Completed</option>
                                                    <option value="CANCELLED">Cancelled</option>
                                                </select>
                                            </div>
                                        </div>
                                        
                                        <div class="col-md-4">
                                            <div class="mb-3">
                                                <label for="startDate" class="form-label">Start Date</label>
                                                <input type="datetime-local" class="form-control" th:field="*{startDate}" id="startDate">
                                            </div>
                                        </div>
                                        
                                        <div class="col-md-4">
                                            <div class="mb-3">
                                                <label for="endDate" class="form-label">End Date</label>
                                                <input type="datetime-local" class="form-control" th:field="*{endDate}" id="endDate">
                                            </div>
                                        </div>
                                    </div>

                                    <div class="row">
                                        <div class="col-md-6">
                                            <div class="mb-3">
                                                <label for="medication" class="form-label">Medication</label>
                                                <textarea class="form-control" th:field="*{medication}" id="medication" rows="4"></textarea>
                                            </div>
                                        </div>
                                        
                                        <div class="col-md-6">
                                            <div class="mb-3">
                                                <label for="dosage" class="form-label">Dosage</label>
                                                <textarea class="form-control" th:field="*{dosage}" id="dosage" rows="4"></textarea>
                                            </div>
                                        </div>
                                    </div>

                                    <div class="row">
                                        <div class="col-md-6">
                                            <div class="mb-3">
                                                <label for="frequency" class="form-label">Frequency</label>
                                                <input type="text" class="form-control" th:field="*{frequency}" id="frequency">
                                            </div>
                                        </div>
                                        
                                        <div class="col-md-6">
                                            <div class="mb-3">
                                                <label for="instructions" class="form-label">Instructions</label>
                                                <textarea class="form-control" th:field="*{instructions}" id="instructions" rows="3"></textarea>
                                            </div>
                                        </div>
                                    </div>

                                    <div class="row">
                                        <div class="col-12">
                                            <div class="mb-3">
                                                <label for="notes" class="form-label">Additional Notes</label>
                                                <textarea class="form-control" th:field="*{notes}" id="notes" rows="4"></textarea>
                                            </div>
                                        </div>
                                    </div>

                                    <div class="d-flex justify-content-between">
                                        <a th:href="@{'/doctor/treatment-plans/' + ${treatmentPlan.id}}" class="btn btn-outline-secondary">Cancel</a>
                                        <button type="submit" class="btn btn-primary">Update Treatment Plan</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
