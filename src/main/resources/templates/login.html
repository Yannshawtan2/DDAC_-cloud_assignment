<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
        <style>
            body {
                min-height: 100vh;
                background: #D1E9F6;
                color: #000;
            }
            .card {
                background: #F6EACB;
                backdrop-filter: blur(4px);
                border: none;
                box-shadow: 0 4px 24px rgba(0,0,0,0.08);
            }
            .btn-primary {
                background: #EECAD5;
                border: none;
                color: #000;
            }
            .btn-primary:hover {
                background: #F1D3CE;
                color: #000;
            }
            .text-primary {
                color: #000 !important;
            }
            .form-control:focus {
                border-color: #EECAD5;
                box-shadow: 0 0 0 0.2rem rgba(238,202,213,.15);
                color: #000;
            }
            .bi-envelope, .bi-lock {
                color: #000 !important;
            }
        </style>
    <title>Login</title>
</head>
<body>
    <div th:replace="fragments/navbar :: navbar"></div>
    <div class="d-flex align-items-center justify-content-center" style="min-height:100vh;">
        <div class="card w-100" style="max-width: 400px;">
            <div class="card-header text-center pb-2 bg-white border-0">
                <h2 class="fw-bold text-gray-800">Welcome Back</h2>
                <p class="text-muted">Sign in to your medical dashboard</p>
            </div>
            <div class="card-body">
                <form th:action="@{/login}" method="post" class="mb-3">
                    <div th:if="${param.error}" class="alert alert-danger">Invalid email or password.</div>
                    <div class="mb-3">
                        <label for="email" class="form-label">Email Address</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                            <input type="email" class="form-control" id="email" name="username" placeholder="doctor@healthcare.com" required>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">Password</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-lock"></i></span>
                            <input type="password" class="form-control" id="password" name="password" placeholder="Enter your password" required>
                        </div>
                    </div>
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="rememberMe" name="remember-me">
                            <label class="form-check-label" for="rememberMe">Remember me</label>
                        </div>
                        <a href="#" class="text-primary">Forgot password?</a>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Sign In</button>
                </form>
                <div class="text-center">
                    <p class="text-muted">Don't have an account?
                        <a th:href="@{/register}" class="text-primary fw-medium">Register here</a>
                    </p>
                </div>
                <div class="mt-4 p-3 bg-light rounded">
                    <p class="text-center text-muted small mb-0">
                        <strong>Demo Login:</strong><br>
                        Email: doctor@healthcare.com<br>
                        Password: password123
                    </p>
                </div>
            </div>
        </div>
    </div>
    <!-- Bootstrap icons (optional) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    </body>
</html>
