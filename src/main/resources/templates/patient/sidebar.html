<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>
    <!-- Patient Sidebar Fragment -->
    <div th:fragment="patient-sidebar(activePage)" class="col-md-3 col-lg-2 d-md-block bg-light sidebar collapse">
        <div class="position-sticky pt-3">
            <!-- Patient Info -->
            <div class="sidebar-header mb-4">
                <div class="d-flex align-items-center">
                    <div class="avatar-circle">
                        <i class="fas fa-user"></i>
                    </div>
                    <div class="ms-3">
                        <h6 class="mb-0">Patient Portal</h6>
                        <small class="text-muted">Diabetes Care</small>
                    </div>
                </div>
            </div>

            <!-- Navigation Menu -->
            <ul class="nav flex-column">
                <li class="nav-item">
                    <a class="nav-link" th:classappend="${activePage == 'dashboard'} ? 'active'" href="/patient/dashboard">
                        <i class="fas fa-tachometer-alt me-2"></i>
                        Dashboard
                    </a>
                </li>
                
                <!-- Events Section -->
                <li class="nav-item mt-2">
                    <small class="text-uppercase fw-bold text-muted px-3">Events</small>
                </li>
                
                <li class="nav-item">
                    <a class="nav-link" th:classappend="${activePage == 'events'} ? 'active'" href="/patient/events">
                        <i class="fas fa-calendar-day me-2"></i>
                        Events
                    </a>
                </li>
                
                <!-- Quiz Section -->
                <li class="nav-item mt-2">
                    <small class="text-uppercase fw-bold text-muted px-3">Assessment</small>
                </li>
                
                <li class="nav-item">
                    <a class="nav-link" th:classappend="${activePage == 'quiz-home'} ? 'active'" href="/patient/quiz">
                        <i class="fas fa-question-circle me-2"></i>
                        Quiz Home
                    </a>
                </li>
                
                <li class="nav-item">
                    <a class="nav-link" th:classappend="${activePage == 'quiz-history'} ? 'active'" href="/patient/quiz/history">
                        <i class="fas fa-history me-2"></i>
                        Quiz History
                    </a>
                </li>
                
                <!-- Treatment Section -->
                <li class="nav-item mt-2">
                    <small class="text-uppercase fw-bold text-muted px-3">Care Plans</small>
                </li>
                
                <li class="nav-item">
                    <a class="nav-link" th:classappend="${activePage == 'diet-plans'} ? 'active'" href="/patient/diet-plans">
                        <i class="fas fa-utensils me-2"></i>
                        My Diet Plans
                    </a>
                </li>
                
                <li class="nav-item">
                    <a class="nav-link" th:classappend="${activePage == 'treatment-plans'} ? 'active'" href="/patient/treatment-plans">
                        <i class="fas fa-stethoscope me-2"></i>
                        My Treatment Plans
                    </a>
                </li>
                
                <!-- Appointment Section -->
                <li class="nav-item mt-2">
                    <small class="text-uppercase fw-bold text-muted px-3">Appointments</small>
                </li>
                
                <li class="nav-item">
                    <a class="nav-link" th:classappend="${activePage == 'appointment-booking'} ? 'active'" href="/patient/appointmentBooking">
                        <i class="fas fa-calendar-plus me-2"></i>
                        Book Appointment
                    </a>
                </li>
                
                <li class="nav-item">
                    <a class="nav-link" th:classappend="${activePage == 'appointments'} ? 'active'" href="/patient/appointments">
                        <i class="fas fa-calendar-check me-2"></i>
                        View Appointments
                    </a>
                </li>
            </ul>
            <!-- Logout -->
            <div class="mt-auto pt-4">
                <form action="/logout" method="post" class="d-inline">
                    <button type="submit" class="btn btn-outline-danger btn-sm w-100">
                        <i class="fas fa-sign-out-alt me-2"></i>Logout
                    </button>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
