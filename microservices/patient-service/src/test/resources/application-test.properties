# Test Configuration for Patient Service

# Application Info
spring.application.name=patient-service-test
server.port=0

# In-Memory Database Configuration for Testing
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# JPA/Hibernate Configuration for Testing
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.use_sql_comments=false

# H2 Console (for debugging tests if needed)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Logging Configuration for Tests
logging.level.com.example.patientservice=WARN
logging.level.org.springframework.web=WARN
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=WARN
logging.level.org.springframework.test=INFO

# Jackson Configuration
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=UTC

# Disable unnecessary features for testing
management.endpoints.enabled-by-default=false
spring.jpa.open-in-view=false

# Test Transaction Configuration
spring.transaction.default-timeout=10
spring.transaction.rollback-on-commit-failure=true

# Disable CORS for testing
spring.web.cors.allowed-origins=
spring.web.cors.allowed-methods=
spring.web.cors.allowed-headers=