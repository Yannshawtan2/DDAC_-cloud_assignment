# Production/Lambda configuration
# DO NOT set spring.profiles.active here - it's invalid!

# Database Configuration (from environment variables)
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration - prevent eager connection
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=never

# Connection pool settings optimized for Lambda
spring.datasource.hikari.maximum-pool-size=2
spring.datasource.hikari.minimum-idle=0
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.initialization-fail-timeout=-1

# Prevent eager database connection during startup
spring.jpa.open-in-view=false
spring.datasource.hikari.auto-commit=true

# Lambda-specific optimizations
spring.main.lazy-initialization=true
logging.level.com.example.diagnosisnotes=INFO
logging.level.org.springframework.web=WARN
logging.level.org.springframework.security=WARN 