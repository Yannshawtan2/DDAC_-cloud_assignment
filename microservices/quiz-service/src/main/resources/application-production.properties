# Production/Lambda configuration
# DO NOT set spring.profiles.active here - it's invalid!

# Database Configuration (from environment variables)
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Logging Configuration
logging.level.com.example.quiz=INFO
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=INFO

# User Service Configuration
user.service.base.url=${USER_SERVICE_URL:https://dafoepzir0.execute-api.us-east-1.amazonaws.com/dev/user}

# Jackson Configuration
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=UTC

# AWS Lambda Configuration
server.servlet.context-path=/

# Health Check Configuration
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always


# Connection Pool Configuration
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000